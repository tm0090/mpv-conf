# === General and Video ===

fullscreen=no
no-fullscreen
                      # Do not start in fullscreen
keep-open=yes                      # Keep window open after playback
title=${filename}                 # Show filename in title bar
script-opts=osc-title=${filename} # Display filename in On Screen Controller (OSC)
cursor-autohide=500               # Hide cursor after 500ms

# === Window Behavior ===

border=no                         # Optional: remove window border
ontop=no                          # Optional: don’t stay on top

# === On Screen Display (OSD) ===

osd-bar=no
osd-font-size=20
osd-font=Source Sans Pro SemiBold
osd-color=#CCFFFFFF
osd-border-color=#DD322640

# === Audio ===

volume=100
volume-max=150
alang=eng,en,enUS,en-US,English,jpn,jp,jap,Japanese
audio-file-auto=fuzzy

# === Subtitles ===

sub-visibility=yes
sub-font=Source Sans Pro SemiBold
sub-font-size=47
sub-color=#FFFFFFFF
sub-border-color=#FF262626
sub-border-size=3.2
sub-shadow-offset=1
sub-shadow-color=#33000000
sub-spacing=0.5
sub-margin-y=70
slang=eng,en,enUS,en-US,English
sub-auto=fuzzy

# === Screenshots ===

screenshot-format=png
screenshot-webp-lossless=yes
screenshot-high-bit-depth=yes
screenshot-sw=no
screenshot-template=%f-%wH.%wM.%wS.%wT-#%#00n



no-input-default-bindings

